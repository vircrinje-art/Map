<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Карта мира</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    #map {
      height: 100vh;
      width: 100%;
      background: #111;
    }
    .popup-title {
      font-weight: 700;
      margin-bottom: 6px;
    }
    .popup-img {
      width: 220px;
      max-width: 100%;
      display: block;
      margin-top: 8px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', {
      crs: L.CRS.Simple,
      minZoom: -2
    });

    const imageWidth = 3000;
    const imageHeight = 2000;
    const bounds = [[0, 0], [imageHeight, imageWidth]];

    L.imageOverlay('world-map.png', bounds).addTo(map);
    map.fitBounds(bounds);

    const locations = [
      {
        name: 'Столица Эларис',
        x: 900,
        y: 650,
        text: 'Главный город королевства, центр торговли и магии.',
        image: 'city.jpg'
      },
      {
        name: 'Башня Лунного Оракула',
        x: 1800,
        y: 900,
        text: 'Древняя башня, где живёт прорицатель.',
        image: 'tower.jpg'
      },
      {
        name: 'Пещеры Тёмного Берега',
        x: 2200,
        y: 1450,
        text: 'Опасная зона с монстрами и редкими ресурсами.',
        image: 'cave.jpg'
      }
    ];

    locations.forEach(loc => {
      const marker = L.marker([loc.y, loc.x]).addTo(map);

      const popupHtml = `
        <div class="popup-title">${loc.name}</div>
        <div>${loc.text}</div>
        ${loc.image ? `<img class="popup-img" src="${loc.image}" alt="${loc.name}">` : ''}
      `;

      marker.bindPopup(popupHtml);
    });
  </script>
</body>
</html>
